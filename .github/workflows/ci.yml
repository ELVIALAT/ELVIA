name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  api:
    name: API — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'placeholder' }}

  web:
    name: Web — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 (npm 11) — debe coincidir con el npm que generó
          # apps/web/package-lock.json. npm 10 (Node 22) resuelve el árbol de
          # esbuild distinto y rechaza el lockfile en `npm ci`.
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Tests de runtime (vitest + jsdom): persistencia del CV-wizard y smoke de
      # montaje de las pantallas refactorizadas. Mockean todo (supabase/api/fetch)
      # → sin red ni secretos. NON-BLOCKING hasta estabilizar: quitar
      # `continue-on-error` para volverlos obligatorios.
      # Nota: los tests de aislamiento del backend (npm run test:isolation) NO van en
      # CI — mutan staging y usan slugs fijos (colisión entre corridas concurrentes);
      # se corren a mano antes de release.
      - name: Test (vitest) — non-blocking
        run: npx vitest run
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.railway.app
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_SENTRY_DSN: ''
          VITE_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
