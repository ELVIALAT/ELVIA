[build]
  base = "apps/web"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ────────────────────────────────────────────────────────────────────────────
# Security Headers — SOC2 + OWASP compliance
# ────────────────────────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.tailwindcss.com https://challenges.cloudflare.com https://static.cloudflareinsights.com https://translate.googleapis.com https://translate-pa.googleapis.com https://www.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://*.up.railway.app https://*.supabase.co wss://*.supabase.co https://api.deepseek.com https://api.anthropic.com https://challenges.cloudflare.com https://cloudflareinsights.com https://translate.googleapis.com https://translate-pa.googleapis.com https://*.clarity.ms; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; worker-src 'self' blob:"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    X-XSS-Protection = "1; mode=block"
    X-Powered-By = ""

# ────────────────────────────────────────────────────────────────────────────
# Cache Headers
# ────────────────────────────────────────────────────────────────────────────

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
