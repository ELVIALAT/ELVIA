<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" fill="none">
  <!-- 7-dot T mark (Telefónica isotype) -->
  <g fill="#0066FF">
    <circle cx="20" cy="20" r="9"/>
    <circle cx="45" cy="20" r="9"/>
    <circle cx="70" cy="20" r="9"/>
    <circle cx="45" cy="45" r="9"/>
    <circle cx="45" cy="68" r="9"/>
  </g>
  <!-- Wordmark -->
  <text x="100" y="60"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="48" font-weight="400" fill="#0066FF" letter-spacing="-1">
    Telefónica
  </text>
</svg>
