[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ────────────────────────────────────────────────────────────────────────────
# Security Headers — SOC2 + OWASP compliance
# ────────────────────────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    # ── Previene inyección de scripts (XSS) ───────────────────────────────
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.tailwindcss.com https://challenges.cloudflare.com https://static.cloudflareinsights.com https://translate.googleapis.com https://translate-pa.googleapis.com https://www.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://*.up.railway.app https://*.supabase.co wss://*.supabase.co https://api.deepseek.com https://api.anthropic.com https://challenges.cloudflare.com https://cloudflareinsights.com https://translate.googleapis.com https://translate-pa.googleapis.com https://*.clarity.ms; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; worker-src 'self' blob:"

    # ── Previene MIME sniffing (evita que navegador interprete mal archivos) ──
    X-Content-Type-Options = "nosniff"

    # ── Previene clickjacking (no permitir iframe embeddings) ───────────────
    X-Frame-Options = "DENY"

    # ── Controla referer leakage ───────────────────────────────────────────
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ── HSTS: fuerza HTTPS en el navegador ────────────────────────────────
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # ── Permissions Policy: bloquea acceso a cámaras, micrófonos, etc. ──────
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # ── Habilita filtro XSS del navegador ─────────────────────────────────
    X-XSS-Protection = "1; mode=block"

    # ── Reduce información expuesta en headers ────────────────────────────
    X-Powered-By = ""

# ────────────────────────────────────────────────────────────────────────────
# Cache Headers — evita que chunks viejos rompan tras un deploy nuevo
# ────────────────────────────────────────────────────────────────────────────

# index.html nunca se cachea → el browser siempre obtiene el HTML con los
# hashes de chunks del deploy más reciente.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Assets con hash en el nombre → inmutables, caché de 1 año.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
